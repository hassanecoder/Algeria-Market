openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dzair-Tech Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: listings
    description: Phone & accessories listings
  - name: categories
    description: Product categories
  - name: brands
    description: Phone brands
  - name: wilayas
    description: Algerian wilayas

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get all listings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: brandId
          in: query
          schema:
            type: integer
        - name: wilayaId
          in: query
          schema:
            type: integer
        - name: condition
          in: query
          schema:
            type: string
            enum: [new, used, refurbished]
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [listings]
      summary: Get featured listings for homepage
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/{id}:
    get:
      operationId: getListingById
      tags: [listings]
      summary: Get a listing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /brands:
    get:
      operationId: getBrands
      tags: [brands]
      summary: Get all brands
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"

  /wilayas:
    get:
      operationId: getWilayas
      tags: [wilayas]
      summary: Get all Algerian wilayas
      responses:
        "200":
          description: List of wilayas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wilaya"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    Wilaya:
      type: object
      properties:
        id:
          type: integer
        code:
          type: integer
        name:
          type: string
        nameAr:
          type: string
      required:
        - id
        - code
        - name
        - nameAr

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: string
        slug:
          type: string
        icon:
          type: string
        listingCount:
          type: integer
      required:
        - id
        - name
        - nameAr
        - slug
        - icon

    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
        listingCount:
          type: integer
      required:
        - id
        - name
        - slug
        - logo

    Seller:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        wilayaName:
          type: string
        memberSince:
          type: string
        isVerified:
          type: boolean
        totalListings:
          type: integer
      required:
        - name
        - phone
        - wilayaName
        - memberSince
        - isVerified
        - totalListings

    Listing:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        condition:
          type: string
          enum: [new, used, refurbished]
        images:
          type: array
          items:
            type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        brandId:
          type: integer
        brandName:
          type: string
        wilayaId:
          type: integer
        wilayaName:
          type: string
        wilayaCode:
          type: integer
        specs:
          type: object
          additionalProperties:
            type: string
        seller:
          $ref: "#/components/schemas/Seller"
        isFeatured:
          type: boolean
        views:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - price
        - condition
        - images
        - categoryId
        - categoryName
        - brandId
        - brandName
        - wilayaId
        - wilayaName
        - wilayaCode
        - isFeatured
        - views
        - createdAt

    ListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - listings
        - total
        - page
        - limit
        - totalPages

    CreateListingRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 2000
        price:
          type: number
          minimum: 0
        condition:
          type: string
          enum: [new, used, refurbished]
        categoryId:
          type: integer
        brandId:
          type: integer
        wilayaId:
          type: integer
        images:
          type: array
          items:
            type: string
        specs:
          type: object
          additionalProperties:
            type: string
        sellerName:
          type: string
        sellerPhone:
          type: string
      required:
        - title
        - description
        - price
        - condition
        - categoryId
        - brandId
        - wilayaId
        - sellerName
        - sellerPhone
